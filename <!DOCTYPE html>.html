<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رصين | المنصة المتكاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .document-paper { box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); width: 210mm; min-height: 297mm; background: white; padding: 25mm; }
        .nav-item { cursor: pointer; padding: 12px 20px; border-radius: 8px; color: #64748b; font-weight: 600; border-right: 4px solid transparent; }
        .nav-active { background: #eff6ff !important; color: #1e3a8a !important; border-right: 4px solid #1e3a8a !important; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <aside class="no-print w-72 bg-white border-l border-slate-200 p-6 flex flex-col">
        <div class="mb-10 text-2xl font-black text-slate-900">رَصين</div>
        <nav id="nav" class="space-y-2 flex-1"></nav>
    </aside>

    <main class="flex-1 flex overflow-hidden">
        <section class="no-print w-1/3 bg-white p-8 border-l border-slate-200 overflow-y-auto">
            <h2 id="service-title" class="text-xl font-bold mb-6">...</h2>
            <div id="dynamic-inputs" class="space-y-4"></div>
            <button onclick="handleSaveAndPrint()" class="w-full mt-8 bg-black text-white font-bold py-3 rounded-lg hover:bg-slate-800 transition">حفظ وطباعة</button>
        </section>

        <section class="flex-1 p-10 overflow-y-auto bg-slate-100 flex justify-center">
            <div id="preview" class="document-paper"></div>
        </section>
    </main>

    <script>
        // ضع المفاتيح هنا بدقة
        const SUPABASE_URL = 'https://berurvnlxvemnfmvmcni.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJlcnVydm5seHZlbW5mbXZtY25pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQzODQ4NzMsImV4cCI6MjA5OTk2MDg3M30.o2VR0Qo3kkZ2aGthMm1UiJwV9mbBmDg6yH9NIgmfIpQ';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentKey = 'contract';

        const services = {
            contract: {
                title: "عقد المقاولات",
                inputs: [{id: 'name', label: 'اسم العميل'}, {id: 'project', label: 'اسم المشروع'}, {id: 'amount', label: 'قيمة العقد'}],
                template: (d) => `<h1>عقد مقاولات</h1><p>العميل: ${d.name}</p><p>المشروع: ${d.project}</p><p>القيمة: ${d.amount}</p>`
            }
        };

        function renderNav() {
            const nav = document.getElementById('nav');
            Object.keys(services).forEach(key => {
                const div = document.createElement('div');
                div.className = 'nav-item nav-active';
                div.innerText = services[key].title;
                nav.appendChild(div);
            });
        }

        function selectService() {
            const container = document.getElementById('dynamic-inputs');
            container.innerHTML = '';
            services.contract.inputs.forEach(field => {
                container.innerHTML += `<div><label class="block text-xs font-bold text-slate-400 mb-1">${field.label}</label><input type="text" id="in-${field.id}" oninput="updatePreview()" class="w-full border-b py-2 outline-none"></div>`;
            });
            updatePreview();
        }

        function updatePreview() {
            const data = {};
            services.contract.inputs.forEach(f => data[f.id] = document.getElementById('in-' + f.id)?.value || '');
            document.getElementById('preview').innerHTML = services.contract.template(data);
        }

        async function handleSaveAndPrint() {
            const data = {};
            services.contract.inputs.forEach(f => data[f.id] = document.getElementById('in-' + f.id)?.value || '');
            
            const { error } = await supabase.from('documents').insert([{ type: 'contract', content: data }]);
            
            if (error) {
                alert('خطأ: ' + error.message);
            } else {
                alert('تم الحفظ بنجاح!');
                window.print();
            }
        }

        renderNav();
        selectService();
    </script>
</body>
</html>
